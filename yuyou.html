<!DOCTYPE html>

<link rel="stylesheet" href="style.css">

<style>

.yuyou-header{
    text-align:center;
    padding:60px 20px;
    background:#FFD6E8;
}

.yuyou-header h1{
    color:#ff5fa2;
    font-size:48px;
}

.yuyou-header p{
    margin-top:10px;
    color:#666;
}

.profile{
    max-width:1000px;
    margin:auto;
}

.profile-image{
    text-align:center;
    margin-bottom:40px;
}

.profile-image img{
    width:300px;
    max-width:90vw;

    border-radius:25px;

    box-shadow:0 5px 20px rgba(0,0,0,.08);

    display:block;
}
.info-grid{
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.info-card{
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.back-button{
    display:inline-block;
    margin-top:30px;
    padding:12px 24px;
    background:white;
    color:#ff5fa2;
    border-radius:999px;
    text-decoration:none;
}

.profile-image{
    position:relative;

    width:300px;
    max-width:90vw;

    margin:0 auto 40px;
}

.watermark{
    position:absolute;

    left:50%;
    bottom:15px;

    transform:translateX(-50%);

    background:rgba(255,255,255,.75);

    padding:6px 14px;

    border-radius:999px;

    color:#ff5fa2;

    font-size:12px;

    font-weight:600;

    pointer-events:none;
}

</style>

</head>
